<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="sidenavOpened = !sidenavOpened">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-icon class="logo-icon">flight</mat-icon>
  <span class="app-name">SkyRoute</span>
  <span class="app-subtitle">Sistema de Reservas de Vuelos</span>
  <span class="toolbar-spacer"></span>
  <span class="version">v1.0</span>
</mat-toolbar>

<mat-sidenav-container class="app-container">
  <mat-sidenav [opened]="sidenavOpened" mode="side" class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/buscar" routerLinkActive="active">
        <mat-icon matListItemIcon>search</mat-icon>
        <span matListItemTitle>Buscar Vuelos</span>
      </a>
      <a mat-list-item routerLink="/reservas" routerLinkActive="active">
        <mat-icon matListItemIcon>list_alt</mat-icon>
        <span matListItemTitle>Reservas</span>
      </a>
      <a mat-list-item routerLink="/pasajeros" routerLinkActive="active">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Pasajeros</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
